<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Datu Beech | Software Developer Wellington NZ</title>

    <meta name="description" content="Datu Beech is a developer based in Wellington, New Zealand.">
    <meta name="author" content="Datu Beech">
    <meta name="theme-color" content="#000000">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: white;
        }

        main {
            min-height: 100vh;

            background:
                linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
                url("static/images/nice-view.JPG");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;

            text-align: center;
            padding: 2rem;
        }

        .content {
            width: 100%;
            max-width: 900px;
        }

        h1 {
            font-size: clamp(3.5rem, 9vw, 7rem);
            font-weight: 400;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 1.5rem;
            text-shadow: 0 2px 25px rgba(0,0,0,0.6);
        }

        .line {
            width: min(450px, 80%);
            height: 1px;
            margin: 0 auto 2rem auto;
            background: rgba(255,255,255,0.35);
        }

        nav {
            margin-bottom: 1.5rem;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .links a {
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }

        .links a:hover {
            opacity: 1;
        }

        .links a:focus-visible {
            outline: 2px solid white;
            outline-offset: 4px;
        }

        .subtitle {
            font-family: 'Special Elite', monospace;
            font-size: 1rem;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        @media (max-width: 600px) {
            .links {
                gap: 1rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
                scroll-behavior: auto !important;
            }
        }
    </style>
</head>

<body>

<main>
    <section class="content" aria-label="Personal introduction">

        <h1>Datu Beech</h1>

        <div class="line" aria-hidden="true"></div>

        <nav aria-label="Social links">
            <div class="links">
                <a href="https://github.com/d-beech" target="_blank" rel="noopener noreferrer">
                    GitHub
                </a>

                <a href="https://linkedin.com/in/datu-beech" target="_blank" rel="noopener noreferrer">
                    LinkedIn
                </a>
            </div>
        </nav>

        <p class="subtitle">
            Developer · Wellington, NZ 
        </p>

    </section>
</main>

</body>
</html>
